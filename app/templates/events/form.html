{% extends "base.html" %}
{% block title %}{% if event %}Edit{% else %}New{% endif %} event{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{% if event %}Edit event{% else %}New event{% endif %}</h1>

<form method="post" action="{% if event %}/events/{{ event.id }}/edit{% else %}/events{% endif %}" class="bg-white p-6 rounded-lg border border-slate-200 space-y-4 max-w-2xl">
    <div>
        <label class="block text-sm font-medium mb-1">Title</label>
        <input type="text" name="title" required value="{{ event.title if event else '' }}" class="w-full px-3 py-2 border border-slate-300 rounded">
    </div>
    <div>
        <label class="block text-sm font-medium mb-1">Description</label>
        <textarea name="description" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded">{{ event.description if event else '' }}</textarea>
    </div>
    <div>
        <label class="block text-sm font-medium mb-1">Location</label>
        <input type="text" name="location" value="{{ event.location if event else '' }}" class="w-full px-3 py-2 border border-slate-300 rounded">
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium mb-1">Start</label>
            <input type="datetime-local" name="start_at" required value="{{ event.start_at.strftime('%Y-%m-%dT%H:%M') if event else '' }}" class="w-full px-3 py-2 border border-slate-300 rounded">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">End</label>
            <input type="datetime-local" name="end_at" required value="{{ event.end_at.strftime('%Y-%m-%dT%H:%M') if event else '' }}" class="w-full px-3 py-2 border border-slate-300 rounded">
        </div>
    </div>
    <div class="flex gap-2 pt-2">
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Save</button>
        <a href="{% if event %}/events/{{ event.id }}{% else %}/events{% endif %}" class="px-4 py-2 text-slate-600 hover:text-slate-900">Cancel</a>
    </div>
</form>
{% endblock %}
